name: Run Python Script

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Pulls your code onto the runner

      - name: Set up Python
        uses: actions/setup-python@v5 # Installs Python on the runner
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi # Installs libraries if file exists

      - name: Run script
        run: python main.py # Executes your Python file
