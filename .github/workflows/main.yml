name: Run Python Script

on:
 schedule:
    # Runs at 00:00 UTC on the 15th of every month
    - cron: '0 0 15 * *'
 workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Pulls your code onto the runner

      - name: Set up Python
        uses: actions/setup-python@v5 # Installs Python on the runner
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi # Installs libraries if file exists
      
      - name: Run script
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: python main.py
        
 
